name: "Unix tests env setup"
description: "Used to setup Unix tests environment"
inputs:
  scala-version:
    description: "Scala version used in the tests"
    required: true
  java-version:
    description: "Java version to use in tests"
    default: "25"
  llvm-version:
    description: "LLVM toolchain version"
    default: "16"
runs:
  using: "composite"
  steps:
    - uses: coursier/cache-action@v6
    - uses: coursier/setup-action@v1
      with:
        jvm: ${{inputs.java-version}}
        apps: sbt

    - name: Calculate binary version
      shell: bash
      run: |
        version=${{ inputs.scala-version }}
        if [[ $version == 2.* ]]; then
          echo "project-version=${version/./_}" >> $GITHUB_ENV
        elif [[ $version == "3-next" ]]; then
          echo "project-version=3_next" >> $GITHUB_ENV
        else 
          echo "project-version=3" >> $GITHUB_ENV
        fi

    - name: Install dependencies
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 10
        max_attempts: 10
        retry_on: error
        shell: bash
        command: |
          sudo apt-get update
          sudo apt-get install libgc-dev

    - name: Install explicit LLVM toolchain
      shell: bash
      if: ${{ inputs.llvm-version != '' }}
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        (yes "" || true) | sudo ./llvm.sh ${{ inputs.llvm-version }}
        # Prefer apt.llvm.org install over /usr/bin/clang (Discover uses LLVM_BIN / PATH).
        LLVM_TOOLCHAIN="/usr/lib/llvm-${{ inputs.llvm-version }}/bin"
        if [[ -d "$LLVM_TOOLCHAIN" ]]; then
          echo "LLVM_BIN=$LLVM_TOOLCHAIN" >> "$GITHUB_ENV"
          echo "$LLVM_TOOLCHAIN" >> "$GITHUB_PATH"
          echo "Using toolchain: $("$LLVM_TOOLCHAIN/clang" --version | head -1)"
        else
          echo "::warning::No directory $LLVM_TOOLCHAIN (e.g. llvm-version=latest); set LLVM_BIN on the step if needed."
        fi
